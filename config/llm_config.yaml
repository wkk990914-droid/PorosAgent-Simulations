# LLM configuration for MatClaw
# API keys use ${ENV_VAR} syntax - expanded at runtime

default_provider: claude

providers:
  openai:
    model_id: gpt-5.4
    api_key: ${OPENAI_API_KEY}
    context_window: 200000     # GPT-5.2: near-perfect at 256K (MRCR v2)
    reasoning_effort: high

  gemini:
    model_id: gemini/gemini-3-flash-preview
    api_key: ${GEMINI_API_KEY}
    context_window: 100000     # Gemini: steep decay above 128K (MRCR v2)

  claude:
    model_id: openai/claude-3-7-sonnet-20250219
    api_key: ${CLAUDE_API_KEY}
    api_base: https://lanyiapi.com/v1
    context_window: 200000
    timeout: 600

  deepseek:
    model_id: deepseek/deepseek-chat
    api_key: ${DEEPSEEK_API_KEY}
    context_window: 100000     # conservative default (no MRCR data)

# Agent execution settings
agent:
  max_steps: 100
  context_pruning: true         # enable zone-based context management (default: true)
  experience_file: config/experience.md   # cross-session lessons, auto-injected into prompts
  additional_authorized_imports:
    - json
    - math
    - numpy
    - numpy.*
    - scipy
    - scipy.*
    - pymatgen
    - pymatgen.*
    - jobflow
    - jobflow.*
    - jobflow_remote
    - jobflow_remote.*
    - atomate2
    - atomate2.*
    - dpdata
    - dpdata.*
    - matplotlib
    - matplotlib.*
    - ase
    - ase.*
    - inspect
  instructions: |
    Never use open() for file operations. Always use write_text/read_text.

    If real computations are requested, use jobflow-remote to submit jobs to remote HPC:
    - Prefer to use atomate2 Makers (e.g., RelaxMaker) to create jobs if possible, otherwise define custom jobs
    - Use submit_flow() to submit, then wait_for_jobflow() to block until completion
    - Output is a dict: e.g., output["output"]["energy"], output["output"]["structure"]

    BATCHING STRATEGIES: Each SLURM job submission costs ~1-2 min overhead
    (queue registration, node allocation, environment setup). Two mechanisms
    reduce this overhead:

    1. BATCH WORKER (multiple Jobs -> one SLURM submission):
       Packs all Jobs in a Flow into one SLURM allocation (up to 4 parallel
       per node). Pays the ~1-2 min overhead once instead of N times.
       Without batch worker, N jobs also compete for the shared queue's
       concurrent submission limit, causing 30-60+ min wait per job.
       Rule: use the batch worker for any Flow with 2+ independent Jobs.

    2. BATCH_STATIC_EVAL TOOL (N evaluations -> one Job):
       Runs N force-field static evaluations in a single Job, eliminating
       per-evaluation SLURM overhead. Accepts structures as inline dicts or
       a remote file path (.traj, .xyz, .extxyz) for large sets.

    Choosing between them: compare each job's computation time to the ~1-2
    min SLURM overhead. If computation time >> overhead (e.g., a 30-min
    training run), use the batch worker -- each job justifies its own SLURM
    submission. If computation time << overhead (e.g., a millisecond static
    evaluation paying 1-2 min overhead), use batch_static_eval to pack all
    evaluations into one job.

    Use the STANDARD worker for single long-running Jobs or sequential chains.

    Queue selection: debug queue waits <10 min but caps at 27 min walltime.
    Shared queue waits 30-60+ min but allows up to 14h. Use debug when job
    runtime is under 27 min.

# Worker descriptions injected into agent instructions when project is specified.
# Keys are "{project}.{worker}" identifiers.
# description: Human-written text explaining when to use this worker.
# The raw jfremote worker config is also injected automatically.

workers:
  perlmutter.perlmutter_debug:
    description: >
      DEFAULT. Use this unless you have a specific reason not to.
      A100 GPU, debug queue. Queue wait: <5 minutes. Walltime limit: 27 min.
      Most jobs finish well within 27 min. Always start here.

  perlmutter.perlmutter_gpu:
    description: >
      DO NOT use this unless a single job absolutely requires >27 min walltime.
      A100 GPU, shared queue. Queue wait: 1-4 HOURS. Walltime: 14h. Max 10 concurrent.
      Using this for short jobs wastes hours waiting in queue. Think before choosing this.

  perlmutter.perlmutter_batch:
    description: >
      DO NOT use for single jobs or small flows.
      Batch worker: packs up to 5000 jobs into one SLURM submission (4 parallel).
      A100 GPU, shared queue. Queue wait: 1-4 HOURS. Walltime: 14h.
      ONLY use when a Flow has 2+ independent jobs to amortize the queue wait.

  anvil.anvil_cpu:
    description: >
      Standard worker (one SLURM job per Job). 128-core CPU wholenode,
      max 2 concurrent jobs. Use for VASP calculations and CPU-only tasks.
